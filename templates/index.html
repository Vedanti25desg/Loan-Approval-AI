<!-- Loan form -->

<!DOCTYPE html>
<html>
<head>
<title>Loan Approval Predictor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1 class="title">AI Loan Approval Predictor</h1>
<p class="subtitle">Check whether your loan may be approved</p>

<div class="container">

<form action="/predict" method="post">

<div class="form-group">
<label>Gender</label>
<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="form-group">
<label>Married</label>
<select name="Married">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="form-group">
<label>Dependents</label>
<input type="number" name="Dependents" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" name="Age" placeholder="Enter your age" required>
</div>

<div class="form-group">
<label>Years Employed</label>
<input type="number" name="Years_Employed" placeholder="Years in current job" required>
</div>

<div class="form-group">
<label>Education</label>
<select name="Education">
<option value="1">Graduate</option>
<option value="0">Not Graduate</option>
</select>
</div>

<div class="form-group">
<label>Self Employed</label>
<select name="Self_Employed">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="form-group">
<label>Applicant Income</label>
<input type="number" name="ApplicantIncome" required>
</div>

<div class="form-group">
<label>Coapplicant Income</label>
<input type="number" name="CoapplicantIncome">
</div>

<div class="form-group">
<label>Loan Amount</label>
<input type="number" name="LoanAmount" required>
</div>

<div class="form-group">
<label>Loan Term (months)</label>
<input type="number" name="Loan_Amount_Term" required>
</div>

<div class="form-group">
<label>Credit History</label>
<select name="Credit_History">
<option value="1">Good</option>
<option value="0">Bad</option>
</select>
</div>

<div class="form-group">
<label>Property Area</label>
<select name="Property_Area">
<option value="0">Rural</option>
<option value="1">Semiurban</option>
<option value="2">Urban</option>
</select>
</div>

<button type="submit">Predict Loan Status</button>

</form>

{% if prediction_text %}
<h2 class="result">{{ prediction_text }}</h2>
{% endif %}

</div>

</body>
</html>
